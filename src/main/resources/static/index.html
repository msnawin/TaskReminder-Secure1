<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskCloud | Manage your day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .task-enter { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .priority-HIGH { color: #ef4444; background: #fee2e2; }
        .priority-MEDIUM { color: #f97316; background: #ffedd5; }
        .priority-LOW { color: #10b981; background: #d1fae5; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-cyan-50 min-h-screen">

<div class="container mx-auto max-w-2xl px-4 py-12">

    <div id="loginView" class="mt-20 text-center task-enter">
        <div class="inline-flex p-4 bg-indigo-600 rounded-3xl shadow-2xl shadow-indigo-200 mb-6">
            <i data-lucide="check-circle-2" class="text-white w-10 h-10"></i>
        </div>
        <h1 class="text-5xl font-extrabold text-slate-900 tracking-tight mb-4">Task<span class="text-indigo-600">Cloud.</span></h1>
        <p class="text-slate-500 text-lg mb-10 max-w-sm mx-auto">The minimalist way to organize your tasks and get email reminders.</p>
        <button onclick="location.href='/oauth2/authorization/google'"
                class="group relative inline-flex items-center justify-center gap-3 bg-white px-8 py-4 rounded-2xl shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 border border-slate-100">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-6 h-6" alt="Google">
            <span class="text-slate-700 font-bold text-lg">Sign in with Google</span>
        </button>
    </div>

    <div id="appView" class="hidden task-enter">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h2 class="text-3xl font-extrabold text-slate-900">My Productivity</h2>
                <p class="text-slate-500 font-medium" id="dateHeader"></p>
            </div>
            <a href="/logout" class="flex items-center gap-2 text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl transition font-bold text-sm">
                <i data-lucide="log-out" class="w-4 h-4"></i> LOGOUT
            </a>
        </header>

        <div class="glass-card p-6 rounded-[2rem] shadow-2xl mb-10 border-0">
            <div class="flex flex-col gap-4">
                <input type="text" id="taskTitle" placeholder="What needs to be done?"
                       class="w-full bg-transparent text-xl font-semibold text-slate-800 placeholder:text-slate-300 outline-none p-2">

                <div class="flex flex-wrap items-center justify-between pt-4 border-t border-slate-100 gap-4">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 text-slate-400">
                            <i data-lucide="calendar" class="w-5 h-5"></i>
                            <input type="date" id="taskDate" class="bg-transparent outline-none font-medium text-sm cursor-pointer hover:text-indigo-600 transition">
                        </div>
                        <div class="flex items-center gap-2 text-slate-400 border-l pl-4">
                            <i data-lucide="flag" class="w-5 h-5"></i>
                            <select id="taskPriority" class="bg-transparent outline-none font-medium text-sm cursor-pointer hover:text-indigo-600 transition appearance-none">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="HIGH">High</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="addTask()" class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-2xl shadow-lg shadow-indigo-100 transition-all active:scale-95">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="taskList" class="space-y-4"></div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="text-slate-300 mb-4"><i data-lucide="layout-list" class="w-16 h-16 mx-auto"></i></div>
            <p class="text-slate-400 font-medium text-lg">No tasks yet. Enjoy your free time!</p>
        </div>
    </div>
</div>

<script>
    document.getElementById('dateHeader').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    async function checkSession() {
        try {
            const res = await fetch("/api/todos");
            if (res.ok) {
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                renderTasks(await res.json());
            }
        } catch (err) { console.log("User not logged in"); }
    }

    async function addTask() {
        const title = document.getElementById('taskTitle').value;
        const dueDate = document.getElementById('taskDate').value;
        const priority = document.getElementById('taskPriority').value;
        if (!title) return;

        const response = await fetch("/api/todos", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, dueDate, priority })
        });

        if (response.ok) {
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDate').value = '';
            document.getElementById('taskPriority').value = 'LOW';
            checkSession();
        }
    }

    async function toggleTask(id) {
        await fetch(`/api/todos/${id}`, { method: 'PATCH' });
        checkSession();
    }

    async function deleteTask(id) {
        if(confirm("Delete this task?")) {
            await fetch(`/api/todos/${id}`, { method: 'DELETE' });
            checkSession();
        }
    }

    function renderTasks(todos) {
        const list = document.getElementById('taskList');
        const empty = document.getElementById('emptyState');

        if (todos.length === 0) {
            empty.classList.remove('hidden');
            list.innerHTML = '';
            return;
        }
        empty.classList.add('hidden');

        list.innerHTML = todos.map(t => `
            <div class="group flex items-center justify-between p-5 bg-white rounded-3xl shadow-sm border border-slate-50 hover:shadow-xl hover:scale-[1.02] transition-all duration-300">
                <div class="flex items-center gap-5">
                    <button onclick="toggleTask(${t.id})"
                            class="w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${t.completed ? 'bg-emerald-500 border-emerald-500' : 'border-slate-200 hover:border-indigo-500'}">
                        ${t.completed ? '<i data-lucide="check" class="text-white w-5 h-5"></i>' : ''}
                    </button>
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-lg ${t.completed ? 'text-slate-300 line-through' : 'text-slate-800'} transition-all">${t.title}</h3>
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-extrabold uppercase tracking-widest priority-${t.priority}">
                                ${t.priority}
                            </span>
                        </div>
                        ${t.dueDate ? `<span class="text-xs font-bold ${t.completed ? 'text-slate-200' : 'text-indigo-400'} uppercase tracking-wider flex items-center gap-1 mt-1">
                            <i data-lucide="clock" class="w-3 h-3"></i> ${formatDate(t.dueDate)}
                        </span>` : ''}
                    </div>
                </div>
                <button onclick="deleteTask(${t.id})" class="p-2 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all opacity-0 group-hover:opacity-100">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function formatDate(dateStr) {
        const options = { month: 'short', day: 'numeric' };
        return new Date(dateStr).toLocaleDateString(undefined, options);
    }

    checkSession();
</script>
</body>
</html>

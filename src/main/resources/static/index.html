<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TaskCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Priority Styling matched to Backend Enum */
        .priority-HIGH { border-left: 6px solid #ef4444 !important; background-color: #fef2f2; }
        .priority-MEDIUM { border-left: 6px solid #f59e0b !important; background-color: #fffbeb; }
        .priority-LOW { border-left: 6px solid #10b981 !important; background-color: #f0fdf4; }

        /* NEW: Priority Dropdown Highlight Fix */
        .priority-select-highlight {
            border: 2px solid #e2e8f0;
            background-color: #f8faff;
            border-left: 4px solid #6366f1; /* Indigo accent to catch the eye */
        }

        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-2">
        <div class="bg-indigo-600 p-2 rounded-lg text-white">
            <i data-lucide="check-square" class="w-5 h-5"></i>
        </div>
        <span class="text-xl font-extrabold text-slate-900 tracking-tight">TaskCloud</span>
    </div>
    <button onclick="location.href='/logout'" class="flex items-center gap-2 text-sm font-bold text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl transition">
        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
    </button>
</nav>

<main class="max-w-4xl mx-auto p-6 mt-8">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 mb-8">
        <h2 class="text-2xl font-extrabold text-slate-900 mb-6">Create New Task</h2>
        <form id="todoForm" onsubmit="return false;" class="space-y-4">

            <div class="w-full">
                <label class="block text-xs font-extrabold text-slate-500 uppercase tracking-wider mb-2 ml-1">Task Title</label>
                <input type="text" id="taskTitle" placeholder="What needs to be done?" required
                       class="w-full px-5 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition text-lg font-medium">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-extrabold text-slate-500 uppercase tracking-wider mb-2 ml-1">Set Priority</label>
                    <select id="taskPriority" class="priority-select-highlight w-full px-4 py-4 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 bg-white font-bold text-indigo-900">
                        <option value="LOW">Low Priority</option>
                        <option value="MEDIUM">Medium Priority</option>
                        <option value="HIGH">High Priority</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-extrabold text-slate-500 uppercase tracking-wider mb-2 ml-1">Due Date</label>
                    <input type="date" id="taskDate" class="w-full px-4 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-slate-600 bg-white font-medium">
                </div>
            </div>

            <button type="button" id="addTaskBtn" class="w-full mt-2 bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                <i data-lucide="plus" class="w-5 h-5"></i> Add Task
            </button>
        </form>
    </div>

    <div id="taskList" class="space-y-4">
    </div>
</main>

<script>
    // 1. Load tasks on page start
    document.addEventListener('DOMContentLoaded', () => {
        fetchTasks();
        lucide.createIcons();
    });

    // 2. Add Task Event Listener
    document.getElementById('addTaskBtn').addEventListener('click', async () => {
        const titleInput = document.getElementById('taskTitle');
        const priorityInput = document.getElementById('taskPriority');
        const dateInput = document.getElementById('taskDate');

        if (!titleInput.value.trim()) {
            alert("Please enter a task title.");
            return;
        }

        const payload = {
            title: titleInput.value,
            priority: priorityInput.value,
            dueDate: dateInput.value || null,
            completed: false
        };

        try {
            const response = await fetch('/api/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                titleInput.value = '';
                dateInput.value = '';
                fetchTasks(); // Refresh list
            } else {
                const errorMsg = await response.text();
                console.error("Submission failed:", errorMsg);
                alert("Failed to add task.");
            }
        } catch (error) {
            console.error("Network error:", error);
        }
    });

    // 3. Fetch Tasks
    async function fetchTasks() {
        try {
            const res = await fetch("/api/todos");
            if (res.ok) {
                const tasks = await res.json();
                renderTasks(tasks);
            } else if (res.status === 401) {
                window.location.href = "/login.html";
            }
        } catch (err) {
            console.error("Failed to fetch tasks:", err);
        }
    }

    // 4. Render Tasks
    function renderTasks(tasks) {
        const container = document.getElementById('taskList');
        container.innerHTML = tasks.length === 0
            ? `<div class="text-center py-10 text-slate-400">No tasks found.</div>`
            : '';

        tasks.forEach(task => {
            const div = document.createElement('div');
            div.className = `task-card bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between priority-${task.priority}`;

            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <input type="checkbox" ${task.completed ? 'checked' : ''}
                           onchange="toggleTask(${task.id})"
                           class="w-6 h-6 rounded-full border-slate-300 text-indigo-600 cursor-pointer">
                    <div>
                        <h3 class="font-bold ${task.completed ? 'line-through text-slate-400' : 'text-slate-800'}">${task.title}</h3>
                        <div class="flex gap-3 mt-1">
                            <span class="text-[10px] font-extrabold uppercase px-2 py-0.5 rounded-md bg-white border border-slate-200 text-slate-500">
                                ${task.priority}
                            </span>
                            <span class="text-[10px] font-bold text-slate-400 flex items-center gap-1">
                                <i data-lucide="calendar" class="w-3 h-3"></i> ${task.dueDate || 'No Date'}
                            </span>
                        </div>
                    </div>
                </div>
                <button onclick="deleteTask(${task.id})" class="p-2 text-slate-300 hover:text-red-500 transition">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            `;
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    async function toggleTask(id) {
        await fetch(`/api/todos/${id}/toggle`, { method: "POST" });
        fetchTasks();
    }

    async function deleteTask(id) {
        await fetch(`/api/todos/${id}`, { method: "DELETE" });
        fetchTasks();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | TaskCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-xl w-full max-w-md border border-slate-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Get Started</h1>
        <p class="text-slate-500 mt-2">Create your account to start organizing</p>
    </div>

    <form id="regForm" class="space-y-4">
        <input type="text" id="name" placeholder="Full Name" required class="w-full px-5 py-3.5 rounded-2xl border outline-none focus:ring-2 focus:ring-indigo-500">
        <input type="email" id="email" placeholder="Gmail Address" required class="w-full px-5 py-3.5 rounded-2xl border outline-none focus:ring-2 focus:ring-indigo-500">
        <input type="password" id="password" placeholder="Password" required class="w-full px-5 py-3.5 rounded-2xl border outline-none focus:ring-2 focus:ring-indigo-500">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required class="w-full px-5 py-3.5 rounded-2xl border outline-none focus:ring-2 focus:ring-indigo-500">

        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 mt-2">
            Create Account
        </button>
    </form>

    <div class="relative my-8 text-center text-slate-400 text-xs font-bold uppercase tracking-widest">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
        <span class="relative bg-white px-4">Or sign up with</span>
    </div>

    <button onclick="location.href='/oauth2/authorization/google'"
            class="w-full flex items-center justify-center gap-3 border border-slate-200 py-4 rounded-2xl hover:bg-slate-50 transition font-bold text-slate-700 shadow-sm">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5" alt="Google">
        Google Account
    </button>

    <p class="text-center mt-8 text-slate-500 font-medium">
        Already have an account? <a href="/login.html" class="text-indigo-600 font-bold hover:underline">Login here</a>
    </p>
</div>

<script>
    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (password !== confirm) return alert("Passwords do not match!");
        if (!email.toLowerCase().endsWith("@gmail.com")) return alert("Please use a @gmail.com address.");

        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, email, password })
        });

        if (await res.text() === "Success") {
            alert("Registration successful!");
            window.location.href = "/login.html";
        } else {
            alert("Email already exists or registration failed.");
        }
    };
</script>
</body>
</html>
